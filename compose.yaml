services:
  server:
    build:
      context: .
      target: final
    env_file:
      - .env
    ports:
      - 8081:8081
    volumes:
      - ./src:/src
    depends_on:
      migrate:
        condition: service_completed_successfully

  database:
    image: postgres:17
    env_file:
      - .env
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # profiles-api-localstack:
  #   image: localstack/localstack:latest
  #   env_file:
  #     - .env
  #   volumes:
  #     - ./localstack:/var/lib/localstack/data
  #     - "./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init.sh"
  #     # Go module root for init-localstack.sh (builds cmd/lambda or uses pre-built lambda-package.zip)
  #     - "./:/tmp/source:ro"
  #     - "./lambda-package:/tmp/lambda-package"
  #     - "/var/run/docker.sock:/var/run/docker.sock"
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 10s

  # Atlas migrations: runs after Postgres is up (not inside initdb — needs network + mounted /migrations).
  # Re-runs on every `compose up`; `atlas migrate apply` is idempotent for already-applied revisions.
  migrate:
    image: arigaio/atlas:latest
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./migrations:/migrations:ro
    command:
      - migrate
      - apply
      - --url
      - postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?sslmode=disable
      - --dir
      - file:///migrations
    restart: "no"

