services:
  server:
    build:
      context: .
      target: final
    env_file:
      - .env
    ports:
      - 6000:80

  database:
    image: postgres:17
    env_file:
      - .env
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

